<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>楞嚴神奇大法會 · 工作SOP 總覽</title>
<style>
  :root{
    --bg:#f6efe2; --paper:#fffdf8; --ink:#2b2118; --muted:#7a6a55;
    --line:#e6dcc7; --gold:#b8860b; --gold-soft:#e8c86a;
    --maroon:#7a1f2b; --plum:#4a2545; --indigo:#2c2350;
    --green:#2f6d4f; --blue:#2b5a86; --red:#b23a3a; --amber:#c9821a;
    --shadow:0 6px 24px rgba(60,40,20,.10);
    --r:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
    font-size:17px; line-height:1.7; -webkit-font-smoothing:antialiased;
  }
  a{color:var(--maroon)}
  .wrap{max-width:1180px;margin:0 auto;padding:0 18px 80px}

  /* header */
  header.hero{
    background:linear-gradient(135deg,#3a2140 0%,#2c2350 55%,#4a2545 100%);
    color:#fdf6e6; padding:34px 0 30px; box-shadow:var(--shadow);
    border-bottom:4px solid var(--gold);
  }
  .hero .wrap{padding-bottom:0}
  .hero h1{margin:0;font-size:34px;letter-spacing:2px;font-weight:800}
  .hero h1 .spark{color:var(--gold-soft)}
  .hero .sub{margin:8px 0 0;font-size:17px;color:#e9dcc2;opacity:.95}
  .hero .cmd{margin-top:16px;display:flex;flex-wrap:wrap;gap:8px}
  .hero .chip{background:rgba(255,255,255,.10);border:1px solid rgba(232,200,106,.4);
    padding:6px 12px;border-radius:999px;font-size:14px;color:#f3e7cd}
  .hero .chip b{color:var(--gold-soft)}

  /* tabs */
  nav.tabs{position:sticky;top:0;z-index:30;background:var(--paper);
    border-bottom:1px solid var(--line);box-shadow:0 2px 10px rgba(60,40,20,.05)}
  nav.tabs .wrap{display:flex;gap:4px;overflow-x:auto;padding:0 18px}
  nav.tabs button{
    appearance:none;border:0;background:transparent;color:var(--muted);
    font-size:16px;font-weight:700;padding:15px 16px;cursor:pointer;white-space:nowrap;
    border-bottom:3px solid transparent;font-family:inherit;
  }
  nav.tabs button.active{color:var(--maroon);border-bottom-color:var(--gold)}
  nav.tabs button:hover{color:var(--ink)}

  section.tab{display:none;padding-top:26px}
  section.tab.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  h2.sec{font-size:24px;margin:6px 0 4px;color:var(--plum);letter-spacing:1px}
  p.lead{color:var(--muted);margin:0 0 20px}

  /* KPI */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:6px 0 26px}
  .kpi{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow);text-align:center}
  .kpi .n{font-size:38px;font-weight:800;color:var(--maroon);line-height:1}
  .kpi .l{color:var(--muted);font-size:14px;margin-top:6px}

  /* cards */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}
  .card.command{grid-column:1/-1;background:linear-gradient(180deg,#fffaf0,#fff);border-color:var(--gold-soft)}
  .dept-h{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .dept-h .dot{width:12px;height:12px;border-radius:50%;background:var(--gold);flex:0 0 auto}
  .codebadge{flex:0 0 auto;width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,#7a1f2b,#4a2545);color:#f6e3c4;display:inline-flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;border:1px solid var(--gold-soft)}
  .dept-h h3{margin:0;font-size:19px;color:var(--plum)}
  .meta{font-size:14px;color:var(--muted);margin:2px 0}
  .meta b{color:var(--ink)}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .tag{background:#f2ead8;border:1px solid var(--line);color:#6a5636;padding:3px 9px;border-radius:8px;font-size:13px}

  /* timeline / workflow */
  .phase-track{display:flex;flex-direction:column;gap:20px}
  .phase{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .phase-head{display:flex;align-items:center;gap:12px;padding:14px 18px;color:#fff}
  .phase-head .idx{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-weight:800}
  .phase-head h3{margin:0;font-size:20px;flex:1}
  .phase-head .win{font-size:14px;opacity:.9}
  .p0 .phase-head{background:linear-gradient(90deg,#5a6a2b,#7a8a3a)}
  .p1 .phase-head{background:linear-gradient(90deg,#2b5a86,#3a72a6)}
  .p2 .phase-head{background:linear-gradient(90deg,#7a1f2b,#a83644)}
  .p3 .phase-head{background:linear-gradient(90deg,#8a5a12,#b8860b)}
  .p4 .phase-head{background:linear-gradient(90deg,#4a2545,#6c3a63)}
  .z-prep .phase-head{background:linear-gradient(90deg,#5a6a2b,#7a8a3a)}
  .z-setup .phase-head{background:linear-gradient(90deg,#2b5a86,#3a72a6)}
  .z-rehearse .phase-head{background:linear-gradient(90deg,#8a5a12,#c9821a)}
  .z-fahui .phase-head{background:linear-gradient(90deg,#7a1f2b,#a83644)}
  .z-jie .phase-head{background:linear-gradient(90deg,#4a2545,#6c3a63)}
  .z-teardown .phase-head{background:linear-gradient(90deg,#2f6d4f,#3f8a66)}
  .rbars{display:grid;grid-template-columns:1fr;gap:7px;background:var(--paper);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:14px 16px}
  .rbar{display:grid;grid-template-columns:130px 1fr 40px;align-items:center;gap:10px;font-size:14px}
  .rbar .rbn{color:var(--ink);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rbar .rbt{background:#f0e7d4;border-radius:6px;height:16px;overflow:hidden}
  .rbar .rbf{display:block;height:100%;background:linear-gradient(90deg,#b8860b,#e8c86a);border-radius:6px}
  .rbar .rbc{font-weight:800;color:var(--maroon);text-align:right}
  @media(max-width:560px){.rbar{grid-template-columns:96px 1fr 34px}}
  .p5 .phase-head{background:linear-gradient(90deg,#2f6d4f,#3f8a66)}
  .mile{display:grid;grid-template-columns:120px 1fr;gap:12px;padding:12px 18px;border-top:1px dashed var(--line)}
  .mile .t{font-weight:800;color:var(--maroon);font-size:15px}
  .mile .ev{font-size:16px}
  .mile .roles{margin-top:5px;font-size:13.5px;color:var(--muted)}
  .mile .roles .lead{display:inline-block;background:#f6e3c4;color:#7a5a12;border:1px solid var(--gold-soft);padding:1px 8px;border-radius:7px;font-weight:700;margin-right:6px}
  .mile .roles .sup{display:inline-block;background:#eef2ec;color:#3f6a52;border:1px solid #d5e4d8;padding:1px 8px;border-radius:7px;margin:2px 6px 0 0}

  /* tables */
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
  .toolbar input,.toolbar select{font-family:inherit;font-size:15px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;background:#fff}
  .toolbar input{min-width:220px}
  .tbl{width:100%;border-collapse:collapse;background:var(--paper);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
  .tbl th{background:#f0e7d4;color:#5a4a2e;text-align:left;font-size:14px;padding:11px 13px;position:sticky;top:52px}
  .tbl td{padding:11px 13px;border-top:1px solid var(--line);font-size:15px;vertical-align:top}
  .tbl tr:hover td{background:#fbf5e8}
  .pill{display:inline-block;padding:2px 9px;border-radius:8px;font-size:13px;font-weight:700;white-space:nowrap}
  .from-p{background:#e8eef6;color:#2b5a86;border:1px solid #cddcec}
  .to-p{background:#f6e6e6;color:#a83644;border:1px solid #ecc9c9}
  .ch{color:var(--muted);font-size:13.5px}
  .flow-arrow{color:var(--gold);font-weight:800;padding:0 4px}

  /* dept SOP accordion */
  .acc{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
  .acc-h{display:flex;align-items:center;gap:12px;padding:15px 18px;cursor:pointer;user-select:none}
  .acc-h .dot{width:12px;height:12px;border-radius:50%;background:var(--gold)}
  .acc-h h3{margin:0;font-size:19px;color:var(--plum);flex:1}
  .acc-h .mm{font-size:14px;color:var(--muted);font-weight:400;max-width:46%;text-align:right}
  .acc-h .caret{transition:transform .2s;color:var(--gold);font-size:20px}
  .acc.open .caret{transform:rotate(90deg)}
  .acc-body{display:none;padding:0 18px 18px;border-top:1px solid var(--line)}
  .acc.open .acc-body{display:block}
  .sop-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:14px}
  @media(max-width:820px){.sop-grid{grid-template-columns:1fr}}
  .box{border:1px solid var(--line);border-radius:12px;padding:12px 14px;background:#fffdfa}
  .box h4{margin:0 0 8px;font-size:15px;color:var(--maroon);letter-spacing:.5px}
  .phase-mini{margin-bottom:12px}
  .phase-mini .pm-h{font-weight:800;color:var(--plum);font-size:14.5px;margin-bottom:4px;border-left:4px solid var(--gold);padding-left:8px}
  .tk{display:grid;grid-template-columns:auto 1fr;gap:8px;font-size:14px;padding:3px 0}
  .tk .tkt{color:var(--maroon);font-weight:700;white-space:nowrap}
  .tk .tko{color:var(--muted);font-size:12.5px}
  .io{font-size:14px;padding:6px 0;border-bottom:1px dashed var(--line)}
  .io:last-child{border-bottom:0}
  .io .g{font-weight:700}
  .risk{font-size:14px;padding:5px 0;border-bottom:1px dashed var(--line)}
  .risk:last-child{border-bottom:0}
  .risk .r{font-weight:700;color:var(--red)}
  .risk .m{color:var(--muted)}
  ul.ck{list-style:none;padding:0;margin:0}
  ul.ck li{padding:5px 0 5px 26px;position:relative;font-size:14.5px;border-bottom:1px dashed var(--line)}
  ul.ck li:before{content:"☐";position:absolute;left:2px;top:4px;color:var(--gold);font-size:16px}
  .kpi-line{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .kpi-line .k{background:#eef4ef;border:1px solid #d5e4d8;color:#2f6d4f;padding:2px 9px;border-radius:8px;font-size:13px}

  /* escalation */
  .esc{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:14px 16px;margin-bottom:12px}
  .esc .issue{font-weight:800;color:var(--red);font-size:16px;margin-bottom:8px}
  .esc-steps{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:8px;align-items:center}
  @media(max-width:720px){.esc-steps{grid-template-columns:1fr}.esc-steps .arr{display:none}}
  .esc-steps .lv{background:#faf4e6;border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:14px}
  .esc-steps .lv b{display:block;color:var(--gold);font-size:12px;margin-bottom:2px}
  .esc-steps .arr{color:var(--gold);font-weight:800;text-align:center}

  .coop{background:var(--paper);border:1px solid var(--line);border-left:5px solid var(--gold);border-radius:12px;box-shadow:var(--shadow);padding:13px 16px;margin-bottom:12px}
  .coop .mo{font-weight:800;color:var(--plum);font-size:17px}
  .coop .gs{margin:6px 0}
  .coop .fl{font-size:14.5px;color:var(--ink)}

  /* responsive cards for matrices */
  .hcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px}
  .hcard{background:var(--paper);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:13px 15px}
  .hcard .flow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:9px}
  .hcard .art{font-size:15.5px;font-weight:700;color:var(--ink);margin-bottom:8px;line-height:1.5}
  .hcard .row{display:grid;grid-template-columns:70px 1fr;gap:8px;font-size:14px;padding:5px 0;border-top:1px dashed var(--line)}
  .hcard .row .lbl{color:var(--muted);font-size:13px}
  .hcard .ev{font-size:16px;font-weight:800;color:var(--plum);margin-bottom:9px}
  .sla-badge{display:inline-block;background:#fdeccb;color:#8a5a12;border:1px solid var(--gold-soft);padding:2px 10px;border-radius:8px;font-size:13.5px;font-weight:700}
  .ch-badge{display:inline-block;padding:2px 10px;border-radius:8px;font-size:13px;font-weight:700;border:1px solid var(--line)}
  .foot{margin-top:34px;color:var(--muted);font-size:13.5px;text-align:center;border-top:1px solid var(--line);padding-top:18px}
  .note{background:#fff7e0;border:1px solid var(--gold-soft);border-radius:12px;padding:12px 16px;font-size:14px;color:#6a5423;margin:0 0 18px}
  .loading{text-align:center;padding:70px 0;color:var(--muted)}
  .rn-body{margin-top:6px}
  .rn-line{font-size:14.5px;padding:5px 0;border-bottom:1px dashed var(--line);line-height:1.6}
  .rn-line:last-child{border-bottom:0}
  .rn-line .rl{display:inline-block;background:#f6e3c4;color:#7a5a12;border:1px solid var(--gold-soft);padding:1px 9px;border-radius:7px;margin-right:6px;font-size:13px}
  .rn-warn{font-size:13.5px;color:#8a3a12;background:#fbeee0;border:1px solid #eec7ad;border-radius:8px;padding:8px 12px;margin-top:8px}
  /* 全組時間表 matrix */
  .mtx-hint{font-size:13px;color:var(--gold);font-weight:700;margin-left:6px}
  .matrix-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);-webkit-overflow-scrolling:touch}
  table.mtx{border-collapse:separate;border-spacing:0;background:var(--paper);min-width:1240px}
  table.mtx th,table.mtx td{border-bottom:1px solid var(--line);border-right:1px solid var(--line);vertical-align:top}
  table.mtx thead th{position:sticky;top:0;z-index:5;color:#fff;font-size:14.5px;font-weight:800;padding:11px 12px;text-align:left;white-space:nowrap}
  table.mtx th.corner{position:sticky;left:0;top:0;z-index:7;background:#3a2140;min-width:120px}
  table.mtx th.rowh{position:sticky;left:0;z-index:4;background:#faf4e6;min-width:120px;max-width:140px;font-size:14px;color:var(--plum);font-weight:800;padding:10px 11px;text-align:left}
  table.mtx th.rowh .codebadge{width:22px;height:22px;font-size:12px;border-radius:6px;margin-right:5px;vertical-align:middle}
  table.mtx td{padding:9px 12px;min-width:235px;max-width:290px}
  table.mtx tbody tr:hover td{background:#fdf9f0}
  .ph0h{background:linear-gradient(90deg,#5a6a2b,#7a8a3a)}
  .ph1h{background:linear-gradient(90deg,#2b5a86,#3a72a6)}
  .ph2h{background:linear-gradient(90deg,#7a1f2b,#a83644)}
  .ph3h{background:linear-gradient(90deg,#8a5a12,#b8860b)}
  .ph4h{background:linear-gradient(90deg,#4a2545,#6c3a63)}
  .ph5h{background:linear-gradient(90deg,#2f6d4f,#3f8a66)}
  .mtk{font-size:13px;padding:4px 0;border-bottom:1px dashed var(--line);line-height:1.55}
  .mtk:last-child{border-bottom:0}
  .mtk .mt{display:inline-block;color:var(--maroon);font-weight:700;margin-right:5px}
  .mnone{color:#cabfa6}
  /* 自動列點 / 有序步驟 */
  ul.bl{margin:3px 0 2px;padding-left:1.15em;list-style:disc}
  ul.bl li{margin:3px 0}
  ul.bl li::marker{color:var(--gold)}
  ol.steps{margin:3px 0 2px;padding-left:1.4em}
  ol.steps li{margin:4px 0;padding-left:2px}
  ol.steps li::marker{color:var(--gold);font-weight:800}
  .fn-lead{font-weight:800;color:var(--plum);margin-bottom:5px;font-size:14.5px}
  ul.fnbl{margin-top:2px}
  /* 人力編制 / 衝突 */
  .mp-list{margin-top:8px}
  .mp-row{display:flex;gap:8px;align-items:baseline;padding:4px 0;border-bottom:1px dashed var(--line);font-size:14.5px}
  .mp-row:last-child{border-bottom:0}
  .pid{display:inline-block;background:#3a2140;color:#f6e3c4;border-radius:6px;padding:1px 9px;font-weight:800;font-size:13.5px;letter-spacing:.5px}
  .mp-role{color:var(--ink)}
</style>
</head>
<body>
<header class="hero">
  <div class="wrap">
    <h1>楞嚴神奇大法會 <span class="spark">·</span> 工作 SOP 總覽</h1>
    <div class="sub" id="subline">前置3天 → 法會3天 → 第4天菩薩戒 → 第5天撤場　·　各組串連 · 互相知會 · 一棒接一棒</div>
    <div class="cmd" id="cmdline"></div>
  </div>
</header>

<nav class="tabs">
  <div class="wrap">
    <button data-tab="overview" class="active">總覽 · 組織</button>
    <button data-tab="zongce">總策劃 · 大排程</button>
    <button data-tab="timeline">主時間軸 Workflow</button>
    <button data-tab="matrix">全組時間表</button>
    <button data-tab="handoff">跨組串連矩陣</button>
    <button data-tab="notify">知會協定</button>
    <button data-tab="coop">壇口協作</button>
    <button data-tab="depts">各組 SOP</button>
    <button data-tab="channels">通訊頻道</button>
    <button data-tab="manpower">人力編制</button>
    <button data-tab="conflict">人力衝突檢查</button>
  </div>
</nav>

<div class="wrap">
  <section class="tab active" id="overview"></section>
  <section class="tab" id="zongce"></section>
  <section class="tab" id="timeline"></section>
  <section class="tab" id="matrix"></section>
  <section class="tab" id="handoff"></section>
  <section class="tab" id="notify"></section>
  <section class="tab" id="coop"></section>
  <section class="tab" id="depts"></section>
  <section class="tab" id="channels"></section>
  <section class="tab" id="manpower"></section>
  <section class="tab" id="conflict"></section>
  <div class="foot" id="foot"></div>
</div>

<script src="data.js"></script>
<script src="manpower.js"></script>
<script src="zongcehua.js"></script>
<script>
const D = window.SOP_DATA;
const $ = (s,el=document)=>el.querySelector(s);
const esc = s => (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const el = (tag,cls,html)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;};
const _split=(t,re)=>t.split(re).map(x=>x.trim()).filter(Boolean);
// 把長句自動拆成列點：優先編號(1. 2.)，其次分號/句號；純箭頭流程→有序步驟
function bul(text){
  let t=String(text==null?'':text).trim(); if(!t) return '';
  const numRe=/(?:^|[\s、，；：:])\d{1,2}[.、)](?=\D)/g;
  let items;
  if((t.match(numRe)||[]).length>=2) items=_split(t,numRe);
  else items=_split(t,/[；;]|。(?=.)/);
  if(items.length>=2) return '<ul class="bl">'+items.map(s=>'<li>'+esc(s)+'</li>').join('')+'</ul>';
  if((t.match(/→/g)||[]).length>=2 && !/[（）()]/.test(t))
    return '<ol class="steps">'+_split(t,/→/).map(s=>'<li>'+esc(s)+'</li>').join('')+'</ol>';
  return esc(t);
}
// 流程（壇口協作）：箭頭一律拆成有序步驟
function bulFlow(text){
  let t=String(text==null?'':text).trim(); if(!t) return '';
  const steps=_split(t,/→/);
  if(steps.length>=2) return '<ol class="steps">'+steps.map(s=>'<li>'+esc(s)+'</li>').join('')+'</ol>';
  return bul(t);
}
// 職掌/使命：冒號前為總述，冒號後的頓號清單拆成列點（末尾「下轄…小組」另處理）
function fnBul(m){
  let t=String(m==null?'':m).trim(); if(!t) return '';
  t=t.replace(/(?:。|；)?\s*下轄[^。；]*?小組[^。；]*(?:。|；)?\s*$/,'').trim();
  const ci=t.search(/[：:]/);
  if(ci>=0){
    const lead=t.slice(0,ci).trim(), body=t.slice(ci+1).trim();
    const items=body.split(/[、；;。]/).map(x=>x.trim()).filter(Boolean);

  }

function enumBul(text){
  let t=String(text==null?'':text).trim(); if(!t) return '';

function phaseOrder(){
  const order=['籌備','入場場佈','法會進行','三皈','圓滿','檢討'];
  const set=[];
  (D.departments||[]).forEach(d=>(d.phases||[]).forEach(p=>{ if(!set.includes(p.phase)) set.push(p.phase); }));
  return set.sort((a,b)=>{
    const ai=order.findIndex(o=>a.includes(o)), bi=order.findIndex(o=>b.includes(o));
    return (ai<0?99:ai)-(bi<0?99:bi);
  });
}

  h+=`<div class="hcards">`;
  rows.forEach(r=>{
    const color = r.type==='無線電頻道'?'#2b5a86':r.type==='LINE群組'?'#2f6d4f':'#8a5a12';
    const icon = r.type==='無線電頻道'?'📻':r.type==='LINE群組'?'💬':'☁️';
    h+=`<div class="hcard"><div class="ev">${icon} ${esc(r.name)}</div>`+
      `<div style="margin-bottom:8px"><span class="ch-badge" style="color:${color};background:#f7f0e0">${esc(r.type)}</span></div>`+
      `<div class="row"><span class="lbl">用途</span><span>${bul(r.purpose)}</span></div>`+
      `<div class="row"><span class="lbl">成員</span><span class="ch">${enumBul(r.members)}</span></div></div>`;
  });
  h+=`</div>`;
  s.innerHTML=h;
}

function renderManpower(){
  const s=$('#manpower'); const M=window.MANPOWER;
  if(!M){ s.innerHTML='<h2 class="sec">人力編制</h2><p class="lead">人力資料尚未載入（manpower.js）。</p>'; return; }
  const people=M.people||[]; const dr=M.deptRoster||{}; const multi=people.filter(p=>p.count>=2);
  let h=`<h2 class="sec">人力編制 · 關鍵人力（編號制）</h2><p class="lead">為保護個資，人員一律以<b>編號</b>呈現（編號↔姓名對照見本機「人員編號對照表-私版.csv」，不上傳網路）。範圍：總指揮中心＋各組組長＋指導法師，共 ${people.length} 位；其中 <b style="color:var(--red)">${multi.length} 位身兼多職</b>。</p>`;
  h+=`<div class="kpis"><div class="kpi"><div class="n">${people.length}</div><div class="l">關鍵人力</div></div><div class="kpi"><div class="n">${Object.keys(dr).length}</div><div class="l">部門</div></div><div class="kpi"><div class="n" style="color:var(--red)">${multi.length}</div><div class="l">身兼多職</div></div></div>`;
  h+=`<div class="grid">`;
  Object.keys(dr).forEach(d=>{
    const rows=dr[d];
    h+=`<div class="card"><div class="dept-h"><span class="dot"></span><h3>${esc(d)}</h3></div><div class="meta">關鍵人力 ${rows.length} 位</div><div class="mp-list">`+
      rows.map(r=>`<div class="mp-row"><span class="pid">#${r.id}</span><span class="mp-role">${esc(r.role)}</span></div>`).join('')+`</div></div>`;
  });
  h+=`</div>`;
  h+=`<h2 class="sec" style="margin-top:26px">身兼多職一覽</h2><p class="lead">同一編號出現在多個角色（可能撞班，詳見「人力衝突檢查」）。</p><div class="hcards">`+
    multi.slice().sort((a,b)=>b.count-a.count).map(p=>`<div class="hcard"><div class="ev"><span class="pid">#${p.id}</span>　身兼 ${p.count} 職</div>`+
      `<ul class="bl">`+p.roles.map(r=>`<li>${esc(r.dept)} · ${esc(r.role)}</li>`).join('')+`</ul></div>`).join('')+`</div>`;
  s.innerHTML=h;
}
function renderConflict(){
  const s=$('#conflict'); const M=window.MANPOWER; const C=M&&M.check;
  if(!C){ s.innerHTML='<h2 class="sec">人力衝突檢查</h2><p class="lead">衝突檢查資料尚未載入（manpower.js）。</p>'; return; }
  const V=C.verdicts||[]; const cc=C.counts||{};
  let h=`<h2 class="sec">人力衝突檢查 · workflow 判定</h2><p class="lead">用 workflow 逐一檢查身兼多職者是否時段撞班、能否執行，並對判為「不可行」者做對抗驗證再定案。</p>`;
  h+=`<div class="kpis"><div class="kpi"><div class="n" style="color:var(--red)">${cc.red||0}</div><div class="l">🔴 不可行</div></div><div class="kpi"><div class="n" style="color:var(--amber)">${cc.amber||0}</div><div class="l">🟡 需注意</div></div><div class="kpi"><div class="n" style="color:var(--green)">${cc.green||0}</div><div class="l">🟢 可兼任</div></div><div class="kpi"><div class="n">${cc.multi||0}</div><div class="l">身兼多職</div></div></div>`;
  if(C.observations&&C.observations.length){
    h+=`<div class="card" style="border-color:var(--gold-soft);margin-bottom:20px"><div class="dept-h"><span class="codebadge" style="background:linear-gradient(135deg,#8a5a12,#b8860b)">觀</span><h3>人力總觀察</h3></div><ul class="bl">`+C.observations.map(o=>`<li>${esc(o)}</li>`).join('')+`</ul></div>`;
  }
  const ord=s=>s&&s.indexOf('🔴')===0?0:s&&s.indexOf('🟡')===0?1:2;
  const sorted=V.slice().sort((a,b)=>ord(a.severity)-ord(b.severity));
  h+=`<div class="hcards">`;
  sorted.forEach(v=>{
    const person=(M.people||[]).find(p=>p.id===v.id);
    const badges=(person?person.roles:[]).map(r=>`<span class="tag">${esc(r.dept)}·${esc(r.role)}</span>`).join('');
    const col=(v.severity||'').indexOf('🔴')===0?'var(--red)':(v.severity||'').indexOf('🟡')===0?'var(--amber)':'var(--green)';
    h+=`<div class="hcard" style="border-left:5px solid ${col}"><div class="ev"><span class="pid">#${esc(v.id)}</span>　${esc(v.severity)}${v.downgraded?' <span class="ch">（驗證後降級）</span>':''}</div>`+
      `<div class="tags" style="margin:4px 0 8px">${badges}</div>`+
      (v.conflictWindow&&v.conflictWindow!=='—'?`<div class="row"><span class="lbl">重疊時段</span><span>${esc(v.conflictWindow)}</span></div>`:'')+
      `<div class="row"><span class="lbl">研判</span><span>${bul(v.reason)}</span></div>`+
      `<div class="row"><span class="lbl">建議</span><span>${bul(v.suggestion)}</span></div>`+
      (v.verifyNote?`<div class="row"><span class="lbl">驗證</span><span class="ch">${esc(v.verifyNote)}</span></div>`:'')+
      `</div>`;
  });
  h+=`</div>`;
  s.innerHTML=h;
}
boot();
</script>
</body>
</html>
